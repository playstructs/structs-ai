name: CI

on:
  push:
    branches: [main, master]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  checks:
    name: Structure & truth checks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Clean-clone smoke test
        run: bash scripts/smoke-test.sh

      - name: Skills mirror in sync
        run: bash scripts/ci/check-skills-mirror.sh

      - name: Command-name lint (deprecated tokens = hard gate)
        run: bash scripts/ci/lint-commands.sh

      - name: Internal link check
        run: bash scripts/ci/check-links.sh

      - name: Generated bundle drift
        run: bash scripts/ci/check-bundles.sh

  jekyll:
    name: Jekyll build (with redirects)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.3"
          bundler-cache: true
      - name: Build site
        run: bundle exec jekyll build --trace
